<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações | Integra</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #07111f, #0f1f33);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    .icone {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 22px;
      background: #ff8a00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: 0 10px 25px rgba(255, 138, 0, 0.35);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #d8e2ef;
      margin-bottom: 28px;
    }

    .status {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 138, 0, 0.14);
      color: #ffb45c;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 26px;
      border: 1px solid rgba(255, 138, 0, 0.35);
    }

    .btn-voltar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      background: #ff8a00;
      color: #111827;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .btn-voltar:hover {
      background: #ff9f2d;
      transform: translateY(-1px);
    }

    .rodape {
      margin-top: 24px;
      font-size: 12px;
      color: #8fa3bd;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
        align-items: stretch;
      }

      .container {
        margin: auto 0;
        padding: 28px 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
      }

      .btn-voltar {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="icone">🔔</div>

    <span class="status">MÓDULO EM CONSTRUÇÃO</span>

    <h1>Notificações</h1>

    <p>
      O módulo de notificações do app Integra ainda está em desenvolvimento.
      Em breve, esta área será utilizada para avisos, alertas, comunicados e atualizações importantes da obra.
    </p>

    <a class="btn-voltar" href="../../index.html">
      ← Voltar para o Menu Principal
    </a>

    <div class="rodape">
      Integra Engenharia • Gestão de Campo
    </div>
  </main>
</body>
</html>
