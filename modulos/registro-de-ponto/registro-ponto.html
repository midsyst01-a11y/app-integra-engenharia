<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Ponto | Integra</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #07111f, #101827);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .icon {
      width: 82px;
      height: 82px;
      margin: 0 auto 22px;
      border-radius: 24px;
      background: rgba(255, 122, 0, 0.14);
      color: #ff7a00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: #cbd5e1;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 122, 0, 0.12);
      color: #ff9f3f;
      border: 1px solid rgba(255, 122, 0, 0.35);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 22px;
    }

    .btn-voltar {
      width: 100%;
      display: inline-block;
      text-decoration: none;
      background: #ff7a00;
      color: #111827;
      font-weight: bold;
      padding: 15px 20px;
      border-radius: 14px;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .btn-voltar:hover {
      background: #ff9f3f;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #64748b;
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
      }

      .btn-voltar {
        font-size: 15px;
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="icon">🕒</div>

    <div class="badge">MÓDULO EM CONSTRUÇÃO</div>

    <h1>Registro de Ponto</h1>

    <p>
      Este módulo ainda está em desenvolvimento no app Integra.
      Em breve, aqui será possível registrar entrada, saída, intervalos
      e acompanhar o histórico de ponto dos colaboradores.
    </p>

    <a class="btn-voltar" href="../../index.html">
      ← Voltar para o Menu Principal
    </a>

    <div class="footer">
      Integra Gestão de Campo
    </div>
  </main>
</body>
</html>
